<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>כלכלת הבית</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  /* פלטת iOS */
  --bg:#F2F2F7; --card:#FFFFFF;
  --label:#1C1C1E; --label2:#3A3A3C; --secondary:#8E8E93; --tertiary:#AEAEB2;
  --sep:rgba(60,60,67,.12);
  --blue:#007AFF; --green:#34C759; --red:#FF3B30; --orange:#FF9500;
  --indigo:#5856D6; --teal:#30B0C7; --purple:#AF52DE; --pink:#FF375F; --mint:#00C7BE;
  --fill:#E9E9EB; --fill2:#F2F2F7;
  --card2:#FFFFFF; --seg-bg:rgba(118,118,128,.12); --seg-on:#FFFFFF;
  --search-bg:rgba(118,118,128,.12); --tab-bg:rgba(249,249,249,.85); --tab-border:rgba(0,0,0,.15);
  --donut-track:#F2F2F7; --grab:#C7C7CC; --sheet-bg:#F2F2F7;
  --r-xl:20px; --r-lg:16px; --r-md:12px; --r-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
@media (prefers-color-scheme: dark){:root:not([data-theme="light"]){
  --bg:#000000; --card:#1C1C1E; --card2:#2C2C2E;
  --label:#FFFFFF; --label2:#D1D1D6; --secondary:#98989F; --tertiary:#5A5A5E;
  --sep:rgba(84,84,88,.55); --fill:#2C2C2E; --fill2:#2C2C2E;
  --seg-bg:rgba(118,118,128,.24); --seg-on:#636366;
  --search-bg:rgba(118,118,128,.24); --tab-bg:rgba(18,18,20,.85); --tab-border:rgba(255,255,255,.12);
  --donut-track:#2C2C2E; --grab:#48484A; --sheet-bg:#1C1C1E;
  --blue:#0A84FF; --green:#30D158; --red:#FF453A; --orange:#FF9F0A;
  --indigo:#5E5CE6; --teal:#40C8E0; --purple:#BF5AF2; --pink:#FF375F; --mint:#63E6E2;
}}
:root[data-theme="dark"]{
  --bg:#000000; --card:#1C1C1E; --card2:#2C2C2E;
  --label:#FFFFFF; --label2:#D1D1D6; --secondary:#98989F; --tertiary:#5A5A5E;
  --sep:rgba(84,84,88,.55); --fill:#2C2C2E; --fill2:#2C2C2E;
  --seg-bg:rgba(118,118,128,.24); --seg-on:#636366;
  --search-bg:rgba(118,118,128,.24); --tab-bg:rgba(18,18,20,.85); --tab-border:rgba(255,255,255,.12);
  --donut-track:#2C2C2E; --grab:#48484A; --sheet-bg:#1C1C1E;
  --blue:#0A84FF; --green:#30D158; --red:#FF453A; --orange:#FF9F0A;
  --indigo:#5E5CE6; --teal:#40C8E0; --purple:#BF5AF2; --pink:#FF375F; --mint:#63E6E2;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;color-scheme:light dark;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--label);
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  font-size:17px; line-height:1.35;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;font-size:inherit}
input,select{font-family:inherit;font-size:17px}
.num{font-variant-numeric:tabular-nums}
#root{min-height:100dvh}
.app{max-width:520px;margin:0 auto;min-height:100dvh}
.screen{padding-bottom:calc(100px + var(--safe-b));animation:fade .22s}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ---------- כותרת גדולה בסגנון iOS ---------- */
.nav{padding:calc(14px + var(--safe-t)) 20px 6px}
.nav .sub{font-size:13px;font-weight:600;color:var(--secondary);letter-spacing:-.01em;margin-bottom:1px}
.nav h1{font-size:34px;font-weight:800;letter-spacing:-.02em}
.nav-row{display:flex;justify-content:space-between;align-items:flex-end}

/* ---------- כרטיס מאזן (בהשראת Apple Card) ---------- */
.hero-card{
  margin:12px 16px 0;border-radius:24px;padding:22px 20px 20px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0A84FF 0%,#4D5DFB 55%,#5E5CE6 100%);
  box-shadow:0 10px 28px rgba(60,90,230,.28);
}
.hero-card.neg{background:linear-gradient(135deg,#FF5E57 0%,#FF375F 60%,#C0264B 100%);box-shadow:0 10px 28px rgba(255,55,95,.28)}
.hero-card::before{content:"";position:absolute;inset:-40% -20% auto auto;width:70%;height:150%;
  background:radial-gradient(closest-side,rgba(255,255,255,.22),transparent);transform:rotate(20deg)}
.hc-top{display:flex;justify-content:space-between;align-items:center}
.hc-label{font-size:13px;font-weight:600;opacity:.85}
.hc-month{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.18);border-radius:100px;padding:3px 6px}
.hc-month span{font-size:13px;font-weight:700;padding:0 6px;min-width:64px;text-align:center}
.hc-month button{width:26px;height:26px;border-radius:50%;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center}
.hc-amt{font-size:42px;font-weight:800;letter-spacing:-.03em;margin:6px 0 2px;line-height:1.05}
.hc-sub{font-size:13.5px;opacity:.85;font-weight:500}
.flow-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin-top:16px;background:rgba(255,255,255,.22)}
.flow-bar div{transition:width .5s cubic-bezier(.22,1,.36,1)}
.flow-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.fl{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;opacity:.95}
.fl .d{width:8px;height:8px;border-radius:50%}

/* ---------- קבוצות בסגנון הגדרות iOS ---------- */
.grp-title{font-size:13px;font-weight:600;color:var(--secondary);text-transform:none;
  padding:20px 32px 7px;letter-spacing:-.005em}
.grp-row-head{display:flex;justify-content:space-between;align-items:baseline;padding:20px 32px 7px}
.grp-row-head .grp-title{padding:0}
.grp-link{font-size:14px;font-weight:600;color:var(--blue)}
.grp{background:var(--card);border-radius:var(--r-lg);margin:0 16px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:52px;position:relative}
.row + .row::before,.row.sep::before{content:"";position:absolute;top:0;inset-inline-start:60px;inset-inline-end:0;height:1px;background:var(--sep)}
.row.no-ico + .row::before{inset-inline-start:16px}
.row:active{background:var(--fill2)}
.row .ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.row .ico svg{width:18px;height:18px}
.row .mid{flex:1;min-width:0}
.row .t{font-size:16.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.row .s{font-size:13px;color:var(--secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row .v{font-size:16.5px;font-weight:600;flex-shrink:0;letter-spacing:-.01em}
.row .chev{color:var(--tertiary);flex-shrink:0;margin-inline-start:-4px}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;vertical-align:1px;margin-inline-start:6px;background:var(--fill);color:var(--secondary)}

/* ---------- סטטיסטיקות ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 16px 0}
.stat{background:var(--card);border-radius:var(--r-lg);padding:14px 16px}
.stat .k{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--secondary)}
.stat .k .d{width:8px;height:8px;border-radius:50%}
.stat .v{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:4px}
.stat .s{font-size:12px;color:var(--secondary);margin-top:1px}

/* דונאט */
.donut-card{background:var(--card);border-radius:var(--r-lg);margin:0 16px;padding:16px;display:flex;align-items:center;gap:18px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0}
.dl{display:flex;align-items:center;gap:8px;font-size:14px}
.dl .d{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dl .nm{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl .vl{color:var(--secondary);font-weight:600;font-size:13.5px}

/* ---------- מסנן מקטעים (Segmented) ---------- */
.seg-wrap{margin:14px 16px 12px}
.seg{display:flex;background:var(--seg-bg);border-radius:10px;padding:2px;position:relative}
.seg button{flex:1;padding:7px 4px;border-radius:8px;font-size:14px;font-weight:600;color:var(--label);transition:all .18s}
.seg button.on{background:var(--seg-on);box-shadow:0 2px 6px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.04)}
.search{display:flex;align-items:center;gap:7px;background:var(--search-bg);border-radius:11px;padding:8px 12px;margin:0 16px 12px;color:var(--secondary)}
.search input{border:none;outline:none;background:none;flex:1;color:var(--label);font-size:16px}
.search input::placeholder{color:var(--secondary)}

/* ---------- תזרים ---------- */
.cf{display:flex;align-items:center;gap:12px;padding:11px 16px;position:relative}
.cf + .cf::before{content:"";position:absolute;top:0;inset-inline-start:16px;inset-inline-end:0;height:1px;background:var(--sep)}
.cf .m{width:62px;flex-shrink:0}
.cf .m b{font-size:14.5px;font-weight:600;display:block}
.cf .m span{font-size:11px;color:var(--secondary)}
.cf .bar{flex:1;height:16px;border-radius:6px;background:var(--fill2);overflow:hidden;display:flex}
.cf .bal{width:76px;text-align:left;font-size:14.5px;font-weight:700;flex-shrink:0}

/* ---------- תובנות ---------- */
.ins{background:var(--card);border-radius:var(--r-lg);margin:0 16px 10px;padding:15px 16px}
.ins-h{display:flex;align-items:flex-start;gap:11px;margin-bottom:6px}
.ins-h .ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;margin-top:1px}
.ins-h .ico svg{width:17px;height:17px}
.ins-h .t{font-size:15.5px;font-weight:700;letter-spacing:-.01em;padding-top:4px}
.ins-b{font-size:14px;line-height:1.5;color:var(--label2)}
.ins-b b{font-weight:700;color:var(--label)}

/* ---------- טאב־בר ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:520px;margin:0 auto;
  background:var(--tab-bg);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--tab-border);
  display:flex;padding:6px 4px calc(4px + var(--safe-b))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;color:var(--secondary)}
.tab svg{width:26px;height:26px}
.tab .tl{font-size:10px;font-weight:600;letter-spacing:-.01em}
.tab.on{color:var(--blue)}

/* ---------- כפתור הוספה ---------- */
.add-btn{width:34px;height:34px;border-radius:50%;background:var(--fill);color:var(--blue);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-btn svg{width:18px;height:18px}
.add-btn:active{opacity:.65}

/* ---------- גיליון תחתון ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;animation:fade .2s}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:91;max-width:520px;margin:0 auto;
  background:var(--sheet-bg);border-radius:16px 16px 0 0;
  padding:8px 16px calc(16px + var(--safe-b));max-height:90dvh;overflow-y:auto;
  animation:up .32s cubic-bezier(.22,1,.36,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grab{width:36px;height:5px;border-radius:3px;background:var(--grab);margin:4px auto 10px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 2px}
.sheet-head h3{font-size:19px;font-weight:700;letter-spacing:-.01em}
.sheet-head .cancel{color:var(--blue);font-size:16px;font-weight:500}
.sheet-head .save{color:var(--blue);font-size:16px;font-weight:700}
.sheet-head .save:disabled{color:var(--tertiary)}
.f-grp{background:var(--card2);border-radius:var(--r-md);overflow:hidden;margin-bottom:14px}
.f-row{display:flex;align-items:center;gap:10px;padding:11px 14px;position:relative;min-height:48px}
.f-row + .f-row::before{content:"";position:absolute;top:0;inset-inline-start:14px;inset-inline-end:0;height:1px;background:var(--sep)}
.f-row label{font-size:15.5px;font-weight:500;width:112px;flex-shrink:0;color:var(--label)}
.f-row input,.f-row select{flex:1;border:none;outline:none;background:none;text-align:start;color:var(--label);min-width:0}
.f-row input::placeholder{color:var(--tertiary)}
.f-row select{-webkit-appearance:none;appearance:none;color:var(--blue);font-weight:500}
.f-note{font-size:12.5px;color:var(--secondary);padding:0 16px 12px;margin-top:-8px}
.seg.small button{font-size:13.5px;padding:6px 2px}
.destroy{display:block;width:100%;background:var(--card2);border-radius:var(--r-md);padding:13px;color:var(--red);font-size:16.5px;font-weight:500;text-align:center}
.destroy:active{background:var(--fill2)}

/* ---------- ריק / קליטה ---------- */
.empty{text-align:center;padding:44px 30px;color:var(--secondary)}
.empty svg{width:44px;height:44px;color:var(--tertiary);margin-bottom:10px}
.empty .et{font-size:16px;font-weight:600;color:var(--label);margin-bottom:4px}
.empty .es{font-size:14px;line-height:1.45}
.cta{display:inline-block;margin-top:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;padding:10px 22px;border-radius:100px}
.cta:active{opacity:.8}

.ob{position:fixed;inset:0;z-index:95;background:var(--bg);overflow-y:auto;
  padding:calc(40px + var(--safe-t)) 24px calc(30px + var(--safe-b));max-width:520px;margin:0 auto}
.ob-ico{width:76px;height:76px;border-radius:20px;background:linear-gradient(135deg,#0A84FF,#5E5CE6);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 24px rgba(60,90,230,.3)}
.ob-ico svg{width:40px;height:40px;color:#fff}
.ob h1{font-size:30px;font-weight:800;text-align:center;letter-spacing:-.02em;margin-bottom:8px}
.ob .lead{font-size:15.5px;color:var(--secondary);text-align:center;line-height:1.5;margin-bottom:26px}
.ob-feat{display:flex;gap:13px;align-items:flex-start;margin-bottom:16px;padding:0 6px}
.ob-feat .ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ob-feat .ico svg{width:19px;height:19px}
.ob-feat b{font-size:15px;display:block;margin-bottom:1px}
.ob-feat p{font-size:13.5px;color:var(--secondary);line-height:1.4}
.ob .big{display:block;width:100%;background:var(--blue);color:#fff;font-size:17px;font-weight:700;padding:15px;border-radius:14px;margin-top:10px;text-align:center}
.ob .big:active{opacity:.85}

.toast{position:fixed;top:calc(12px + var(--safe-t));left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(28,28,30,.92);-webkit-backdrop-filter:blur(10px);color:#fff;padding:9px 18px;border-radius:100px;
  font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fade .2s;white-space:nowrap}
.foot-note{font-size:12.5px;color:var(--secondary);text-align:center;padding:16px 30px 0;line-height:1.5}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>

  car: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12 6.7 6.9A1.5 1.5 0 0 1 8.1 6h7.8a1.5 1.5 0 0 1 1.4.9L19 12"/><rect x="3.5" y="12" width="17" height="6" rx="1.6"/><circle cx="7.5" cy="15" r=".6" fill="currentColor"/><circle cx="16.5" cy="15" r=".6" fill="currentColor"/><path d="M6 18v1.7M18 18v1.7"/></svg>,

const LS_KEY = "home_budget_v2";
const load = () => {
  try{ const d = JSON.parse(localStorage.getItem(LS_KEY));
    if(d && d.settings) return {incomes:d.incomes||[],expenses:d.expenses||[],settings:{...DEFAULT_SETTINGS,...d.settings}};

const fmt = n => "₪" + Math.round(n).toLocaleString("he-IL");
const MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const applies = (e,m) => e.freq==="odd" ? m%2===1 : e.freq==="even" ? m%2===0 : true;
const monthTotal = (list,m) => list.filter(e=>applies(e,m)).reduce((s,e)=>s+Number(e.amount||0),0);

function Ico({name,bg,size}){
  return <span className="ico" style={{background:bg, ...(size?{width:size,height:size}:{})}}>{I[name]||I.pin}</span>;
}

function Donut({data,size=116,label}){
  const total = data.reduce((s,d)=>s+d.v,0) || 1;
  const R=size/2, r=R-11, C=2*Math.PI*r;
  let acc=0;
  return (
    <svg className="donut" width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <circle cx={R} cy={R} r={r} fill="none" style={{stroke:"var(--donut-track)"}} strokeWidth="14"/>
      {data.map((d,i)=>{
        const frac=d.v/total, off=C*(1-acc), dash=(C*frac)+" "+(C*(1-frac));
        acc+=frac;
        return <circle key={i} cx={R} cy={R} r={r} fill="none" stroke={d.c} strokeWidth="14"
          strokeDasharray={dash} strokeDashoffset={off} transform={"rotate(-90 "+R+" "+R+")"}/>;
      })}
      <text x={R} y={R-3} textAnchor="middle" fontSize="16" fontWeight="700" style={{fill:"var(--label)"}} className="num">{fmt(total)}</text>
      <text x={R} y={R+14} textAnchor="middle" fontSize="10" style={{fill:"var(--secondary)"}}>{label||"סה״כ החודש"}</text>
    </svg>
  );
}

/* ===== מסך הבית ===== */
function Dashboard({data,month,setMonth,goTab,onAdd}){
  const inc = data.incomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const fx = monthTotal(data.expenses.filter(e=>e.type==="fixed"),month);
  const vr = monthTotal(data.expenses.filter(e=>e.type==="var"),month);
  const left = inc-fx-vr;
  const hasData = data.incomes.length>0 || data.expenses.length>0;
  const byCat = useMemo(()=>{
    const m={};
    data.expenses.filter(e=>applies(e,month)).forEach(e=>{m[e.cat]=(m[e.cat]||0)+Number(e.amount||0)});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({k,v,c:catOf(k).clr}));
  },[data,month]);
  const base = Math.max(inc,fx+vr)||1;
  const w = v => Math.max(1.5,v/base*100)+"%";
  const hh = data.settings.household || (data.settings.members.length ? "הבית של "+data.settings.members.join(" ו") : "");
  return (
    <div className="screen">
      <div className="nav">
        {hh && <div className="sub">{hh}</div>}
        <h1>כלכלת הבית</h1>
      </div>

      {!hasData ? (
        <div className="grp" style={{marginTop:12}}>
          <div className="empty">
            {I.wallet}
            <div className="et">מתחילים לראות את התמונה</div>
            <div className="es">הוסיפו את ההכנסות וההוצאות הקבועות שלכם —<br/>המערכת תבנה תזרים ותובנות באופן אוטומטי.</div>
            <button className="cta" onClick={onAdd}>הוספת הוצאה ראשונה</button>
          </div>
        </div>
      ) : (
      <React.Fragment>
        <div className={"hero-card"+(left<0?" neg":"")}>
          <div className="hc-top">
            <span className="hc-label">{left>=0?"נשאר החודש":"חריגה החודש"}</span>
            <div className="hc-month">
              <button onClick={()=>setMonth(m=>m===12?1:m+1)}>‹</button>
              <span>{MONTHS[month-1]}</span>
              <button onClick={()=>setMonth(m=>m===1?12:m-1)}>›</button>
            </div>
          </div>
          <div className="hc-amt num">{fmt(Math.abs(left))}</div>
          <div className="hc-sub num">הכנסות {fmt(inc)} · הוצאות {fmt(fx+vr)}</div>
          <div className="flow-bar">
            <div style={{width:w(fx),background:"rgba(255,255,255,.95)"}}/>
            <div style={{width:w(vr),background:"rgba(255,255,255,.55)"}}/>
          </div>

function CashflowScreen({data}){
  const inc = data.incomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const hasData = data.expenses.length>0 || data.incomes.length>0;
  const nowM = new Date().getMonth()+1;
  const rows = Array.from({length:12},(_,i)=>{
    const m = ((nowM-1+i)%12)+1;
    const fx = monthTotal(data.expenses.filter(e=>e.type==="fixed"),m);
    const vr = monthTotal(data.expenses.filter(e=>e.type==="var"),m);
    return {m,fx,vr,bal:inc-fx-vr};
  });
  let acc=0; const withAcc = rows.map(r=>{acc+=r.bal;return {...r,acc}});
  const maxOut = Math.max(...rows.map(r=>r.fx+r.vr),inc,1);
  const yearSave = rows.reduce((s,r)=>s+r.bal,0);
  return (
    <div className="screen">
      <div className="nav">
        <div className="sub">12 החודשים הקרובים</div>
        <h1>תזרים</h1>
      </div>
      {!hasData ? (
        <div className="grp" style={{marginTop:12}}><div className="empty">{I.chart}
          <div className="et">אין עדיין נתונים לתזרים</div>
          <div className="es">הוסיפו הכנסות והוצאות — התחזית תיבנה אוטומטית</div></div></div>
      ) : (
      <React.Fragment>
        <div className={"hero-card"+(yearSave<0?" neg":"")} style={{padding:"18px 20px"}}>
          <span className="hc-label">{yearSave>=0?"חיסכון צפוי בשנה":"גירעון צפוי בשנה"}</span>
          <div className="hc-amt num" style={{fontSize:36}}>{fmt(Math.abs(yearSave))}</div>
          <div className="hc-sub num">ממוצע {fmt(Math.abs(yearSave)/12)} בחודש</div>
        </div>
        <div className="grp-title">חודש אחרי חודש</div>
        <div className="grp">
          {withAcc.map(r=>(
            <div className="cf" key={r.m}>
              <div className="m"><b>{MONTHS[r.m-1]}</b><span className="num">מצטבר {fmt(r.acc)}</span></div>
              <div className="bar">
                <div style={{width:(r.fx/maxOut*100)+"%",background:"var(--blue)"}}/>
                <div style={{width:(r.vr/maxOut*100)+"%",background:"#8ECBFF"}}/>
              </div>
              <div className="bal num" style={{color:r.bal>=0?"var(--green)":"var(--red)"}}>{(r.bal>=0?"+":"−")+fmt(Math.abs(r.bal)).slice(1)} ₪</div>
            </div>
          ))}
        </div>
        <div className="grid2">
          {(()=>{const b=withAcc.reduce((a,r)=>r.bal>a.bal?r:a);
            return <div className="stat"><div className="k"><span className="d" style={{background:"var(--green)"}}/>החודש החזק</div>
              <div className="v num">{fmt(b.bal)}</div><div className="s">{MONTHS[b.m-1]}</div></div>})()}
          {(()=>{const b=withAcc.reduce((a,r)=>r.bal<a.bal?r:a);
            return <div className="stat"><div className="k"><span className="d" style={{background:"var(--red)"}}/>החודש הכבד</div>
              <div className="v num">{fmt(b.bal)}</div><div className="s">{MONTHS[b.m-1]}</div></div>})()}
        </div>
        <p className="foot-note">התזרים מחשב אוטומטית חיובים דו־חודשיים — לכן היתרה משתנה בין החודשים</p>
      </React.Fragment>
      )}
    </div>
  );
}

/* ===== מנוע תובנות ===== */
function buildInsights(data){
  const out=[];
  const inc = data.incomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const m = new Date().getMonth()+1;
  const fx = monthTotal(data.expenses.filter(e=>e.type==="fixed"),m);
  const vr = monthTotal(data.expenses.filter(e=>e.type==="var"),m);
  const left = inc-fx-vr;
  const today = new Date();

  if(data.expenses.length===0 && data.incomes.length===0){
    out.push({ic:"bulb",clr:"var(--orange)",t:"אי אפשר לנהל מה שלא רואים",
      b:<span>הצעד הראשון לשליטה הוא מיפוי: פתחו את פירוט כרטיסי האשראי וחשבון הבנק, והזינו את ההוצאות הקבועות והמשתנות. ברגע שהמספרים מול העיניים — הכול מתחיל לעשות סדר.</span>});
    out.push({ic:"cal",clr:"var(--teal)",t:"10 דקות בשבוע",
      b:<span>קבעו תזכורת שבועית קצרה לעדכון המערכת. זה הרגל קטן שמחזיר שליטה גדולה — ומונע דאגות ומינוס מיותר.</span>});
    return out;
  }

  // תוקפי ביטוחים
  data.expenses.filter(e=>e.expiry).forEach(e=>{
    const d = new Date(e.expiry+"T00:00:00");
    const days = Math.ceil((d-today)/86400000);
    if(days<=90){
      out.push({ic:"bell",clr:days<=30?"var(--red)":"var(--orange)",
        t:e.name+" — "+(days<0?"התוקף פג":"התוקף מסתיים בעוד "+days+" ימים"),
        b:<span>הפוליסה{e.company?" מול "+e.company:""} ({fmt(e.amount)} בחודש) מסתיימת ב־{d.toLocaleDateString("he-IL")}. זה הרגע לבקש הצעות מ־2–3 חברות מתחרות — חיסכון ממוצע בביטוחים: מאות עד אלפי שקלים בשנה.</span>});
    }
  });

  // מאזן + כלל חצי-חצי
  if(inc>0 && left>0){
    out.push({ic:"scale",clr:"var(--green)",t:"נשארו "+fmt(left)+" — כלל החצי־חצי",
      b:<span>חלקו את היתרה לשניים: <b>{fmt(left/2)} לבילויים והנאות עכשיו</b>, ו־<b>{fmt(left/2)} לחיסכון ומטרות עתידיות</b>. חיסכון בלי ליהנות לא מחזיק — האיזון הוא הסוד. בקצב הזה: כ־<b>{fmt(left/2*12)}</b> חיסכון בשנה.</span>});
  } else if(inc>0 && left<0){
    out.push({ic:"bell",clr:"var(--red)",t:"החודש בחריגה של "+fmt(Math.abs(left)),
      b:<span>ההוצאות עוברות את ההכנסות. התחילו מהקבועות הגדולות — שם החיסכון המשמעותי: ביטוחים, תקשורת, חשמל והלוואות.</span>});
  }

  // דיור
  const housing = data.expenses.filter(e=>applies(e,m)&&e.cat==="דיור ומשק בית").reduce((s,e)=>s+Number(e.amount),0);
  if(inc>0 && housing/inc>0.35){
    out.push({ic:"home2",clr:"var(--orange)",t:"דיור ומשק בית — "+Math.round(housing/inc*100)+"% מההכנסה",
      b:<span>זה הנתח הגדול ביותר ({fmt(housing)}). שווה לבדוק פעם בשנה: מעבר לספק חשמל פרטי (הנחה של 5–10%), חבילת תקשורת, וביטוח הדירה.</span>});
  }

  // הלוואות
  const loans = data.expenses.filter(e=>/הלווא|משכנתא/.test(e.name));
  if(loans.length){
    const lt = loans.reduce((s,e)=>s+Number(e.amount),0);
    out.push({ic:"card",clr:"var(--indigo)",t:"החזרי הלוואות: "+fmt(lt)+" בחודש — "+fmt(lt*12)+" בשנה",
      b:<span>לא כל הלוואה רעה, אבל כל ריבית גבוהה כן. בדקו: באיזו ריבית? האם אפשר למחזר בתנאים טובים יותר? איחוד הלוואות קטנות לאחת בריבית נמוכה מפשט את הניהול ומוריד את ההחזר.</span>});
  }

  // מנויים — אפקט הקפה
  const subs = data.expenses.filter(e=>e.cat==="מנויים ותקשורת");
  if(subs.length){
    const st = subs.reduce((s,e)=>s+Number(e.amount),0);
    out.push({ic:"coffee",clr:"var(--purple)",t:"אפקט הקפה: מנויים ותקשורת = "+fmt(st*12)+" בשנה",
      b:<span>{fmt(st)} בחודש נראה כלום — אבל זה <b>{fmt(st*12)} בשנה</b>. עברו על כל מנוי ושאלו: השתמשנו בו החודש? אם לא — לבטל בלי רגשות אשם.</span>});
  }

  // ביטוחי בריאות — הר הביטוח
  if(data.expenses.some(e=>e.cat==="בריאות וכושר"&&/ביטוח|סיעוד/.test(e.name))){
    out.push({ic:"heart",clr:"var(--mint)",t:"בדיקת כפל ביטוחים",
      b:<span>כפל ביטוחי בריאות הוא דליפה נפוצה. בדקו בחינם באתר <b>״הר הביטוח״</b> של רשות שוק ההון אם יש כיסוי כפול בין הביטוחים הפרטיים לשב״ן של הקופה — משפחות רבות מגלות שם מאות שקלים בשנה.</span>});
  }

  // סקר שוק שנתי
  out.push({ic:"cal",clr:"var(--teal)",t:"יום סקר השוק השנתי",
    b:<span>קבעו יום אחד בשנה לבדיקת כל הספקים: ביטוחים, סלולר ואינטרנט, חשמל, בנק. יום אחד שחוסך אלפים. ובשוטף — <b>10 דקות בשבוע</b> של עדכון שוות שקט לכל שאר השבוע.</span>});

  return out;
}

function App(){
  const [data,setData] = useState(load);
  const [tab,setTab] = useState("home");
  const [expTab,setExpTab] = useState("fixed");
  const [month,setMonth] = useState(new Date().getMonth()+1);
  const [sheet,setSheet] = useState(null);
  const [toast,setToast] = useState("");
  const toastT = useRef(null);

  useEffect(()=>{ localStorage.setItem(LS_KEY, JSON.stringify(data)); },[data]);
  useEffect(()=>{
    const t = data.settings.theme||"auto";
    if(t==="auto") delete document.documentElement.dataset.theme;
    else document.documentElement.dataset.theme = t;
  },[data.settings.theme]);
  const notify = t => { setToast(t); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(""),1900); };

  const saveExp = it => { setData(d=>({...d,expenses:d.expenses.some(e=>e.id===it.id)?d.expenses.map(e=>e.id===it.id?it:e):[...d.expenses,{...it,id:nid("e")}]})); setSheet(null); notify("ההוצאה נשמרה"); };
  const delExp = id => { setData(d=>({...d,expenses:d.expenses.filter(e=>e.id!==id)})); setSheet(null); notify("ההוצאה נמחקה"); };
  const saveInc = it => { setData(d=>({...d,incomes:d.incomes.some(i=>i.id===it.id)?d.incomes.map(i=>i.id===it.id?it:i):[...d.incomes,{...it,id:nid("i")}]})); setSheet(null); notify("ההכנסה נשמרה"); };
  const delInc = id => { setData(d=>({...d,incomes:d.incomes.filter(i=>i.id!==id)})); setSheet(null); notify("ההכנסה נמחקה"); };
  const saveSettings = patch => { setData(d=>({...d,settings:{...d.settings,...patch}})); setSheet(null); notify("ההגדרות נשמרו"); };

  const onExport = () => {
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "כלכלת-הבית-גיבוי-"+new Date().toISOString().slice(0,10)+".json";
    a.click(); URL.revokeObjectURL(a.href);
    notify("הגיבוי הורד");
  };
  const onImport = file => {
    const r = new FileReader();
    r.onload = () => {
      try{ const d = JSON.parse(r.result);
        if(!d||!Array.isArray(d.expenses)||!Array.isArray(d.incomes)) throw 0;
        setData({incomes:d.incomes,expenses:d.expenses,settings:{...DEFAULT_SETTINGS,...(d.settings||{}),onboarded:true}});
        notify("הנתונים נטענו");
      }catch(e){ notify("הקובץ אינו גיבוי תקין"); }
    };
    r.readAsText(file);
  };
  const onReset = () => {
    if(window.confirm("לאפס את כל הנתונים? הפעולה אינה הפיכה.")){
      setData({incomes:[],expenses:[],settings:{...DEFAULT_SETTINGS,onboarded:true}});
      notify("הנתונים אופסו");
    }
  };

  const addFromCurrent = () => {
    if(tab==="exp"&&expTab==="inc") setSheet({k:"inc",item:{}});
    else setSheet({k:"exp",item:{type:tab==="exp"&&expTab==="var"?"var":"fixed"}});
  };
  const goTab = t => { setTab(t); window.scrollTo(0,0); };

  if(!data.settings.onboarded){
    return <Onboarding onDone={p=>setData(d=>({...d,settings:{...d.settings,...p,onboarded:true}}))}/>;
  }

  return (
    <div className="app">
      {tab==="home" && <Dashboard data={data} month={month} setMonth={setMonth} goTab={goTab} onAdd={addFromCurrent}/>}
      {tab==="exp" && <ExpensesScreen data={data} month={month} tab={expTab} setTab={setExpTab}
        openEdit={e=>setSheet({k:"exp",item:e})} openEditInc={i=>setSheet({k:"inc",item:i})} onAdd={addFromCurrent}/>}
      {tab==="flow" && <CashflowScreen data={data}/>}
      {tab==="ins" && <InsightsScreen data={data}/>}
      {tab==="set" && <SettingsScreen data={data}
        openProfile={()=>setSheet({k:"profile"})} openPay={()=>setSheet({k:"pay"})}
        onExport={onExport} onImport={onImport} onReset={onReset}
        onTheme={t=>setData(d=>({...d,settings:{...d.settings,theme:t}}))}/>}

      <nav className="tabbar">
        {[["home","house","הבית"],["exp","list","הוצאות"],["flow","chart","תזרים"],["ins","bulb","תובנות"],["set","gear","הגדרות"]].map(([id,ic,lb])=>(
          <button key={id} className={"tab"+(tab===id?" on":"")} onClick={()=>goTab(id)}>{I[ic]}<span className="tl">{lb}</span></button>
        ))}
      </nav>

      {sheet&&sheet.k==="exp"&&<ExpenseSheet item={sheet.item} payMethods={data.settings.payMethods} onSave={saveExp} onDelete={delExp} onClose={()=>setSheet(null)}/>}
      {sheet&&sheet.k==="inc"&&<IncomeSheet item={sheet.item} onSave={saveInc} onDelete={delInc} onClose={()=>setSheet(null)}/>}
      {sheet&&sheet.k==="profile"&&<ProfileSheet settings={data.settings} onSave={saveSettings} onClose={()=>setSheet(null)}/>}
      {sheet&&sheet.k==="pay"&&<PaySheet payMethods={data.settings.payMethods} onSave={pm=>saveSettings({payMethods:pm})} onClose={()=>setSheet(null)}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
